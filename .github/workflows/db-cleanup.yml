name: Weekly Database Cleanup

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout training repository
        uses: actions/checkout@v4
        with:
          repository: ghana-gpt/ghana-gpt-training
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run database cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEON_URL: ${{ secrets.NEON_URL }}
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}
        run: python db_cleanup.py
