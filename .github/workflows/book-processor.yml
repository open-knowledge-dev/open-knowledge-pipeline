name: Book Processor

on:
  workflow_dispatch:
    inputs:
      language_name:
        description: 'Language name (e.g., Twi)'
        required: true
        type: string
      language_code:
        description: 'Language code (e.g., Twi)'
        required: true
        type: string
      region:
        description: 'Region (e.g., Ghana)'
        required: false
        type: string
        default: 'Ghana'

jobs:
  process:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run book processor
        env:
          TRAINING_FORM_URL: ${{ secrets.TRAINING_FORM_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KNOWLEDGE_REPO: ${{ secrets.KNOWLEDGE_REPO }}
        run: |
          python book_processor.py \
            --guide "" \
            --language "${{ github.event.inputs.language_name }}" \
            --code "${{ github.event.inputs.language_code }}" \
            --region "${{ github.event.inputs.region }}"
