name: Web Scraper — General

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run scraper
        env:
          TRAINING_FORM_URL: ${{ secrets.TRAINING_FORM_URL }}
          SUBMISSIONS_PER_RUN: '10'
          SUBMISSION_DELAY: '30'
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KNOWLEDGE_REPO: ${{ secrets.KNOWLEDGE_REPO }}
          SCRAPER_NAME: 'web-wikipedia'
          FOCUS_CATEGORIES: 'Agriculture & Farming,Health & Medicine,Environment & Nature,Food & Cuisine,Science & Innovation'
        run: python scraper.py
